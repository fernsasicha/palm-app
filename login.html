<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <div class="card p-4">

        <h2>🔐 เข้าสู่ระบบ</h2>

        <div class="mb-3">

            <label>เบอร์มือถือ</label>

            <input
                type="text"
                id="phone"
                class="form-control">

        </div>

        <div class="mb-3">

            <label>รหัสผ่าน</label>

            <input
    type="password"
    id="password"
    class="form-control"
    onkeypress="
        if(event.key==='Enter'){
            login();
        }
    ">

        </div>

        <button
            class="btn btn-primary"
            onclick="login()">

            เข้าสู่ระบบ

        </button>



<br><br>

<div class="mt-3">

    <a href="forgot-password.html">
        ลืมรหัสผ่าน
    </a>

    <br>

    <a href="register.html">
        สมัครสมาชิก
    </a>

</div>




    </div>

</div>

<script>

async function login() {

    const response =
        await fetch(
            "https://palm-app-jt0i.onrender.com/login",
            {
                method: "POST",
                headers: {
                    "Content-Type":
                        "application/json"
                },
                body: JSON.stringify({

                    phone:
                        document.getElementById(
                            "phone"
                        ).value,

                    password:
                        document.getElementById(
                            "password"
                        ).value

                })
            }
        );

    const result =
        await response.json();

    if (response.ok) {

        localStorage.setItem(
            "userId",
            result.userId
        );

        localStorage.setItem(
            "ownerId",
            result.ownerId
        );

        localStorage.setItem(
            "role",
            result.role
        );

        localStorage.setItem(
            "fullName",
            result.fullName
        );

        alert(result.message);

location.replace(
    "dashboard.html"
);

    }
    else {

        alert(result.message);

    }

}

</script>

</body>
</html>
