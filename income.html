<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เพิ่มรายรับ</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <div class="container mt-5">

        <h1>🌴 เพิ่มรายรับ</h1>

<div class="mb-4">

    	<a href="dashboard.html" class="btn btn-primary">Dashboard</a>
        <a href="income.html" class="btn btn-success">เพิ่มรายรับ</a>
        <a href="expense.html" class="btn btn-danger">เพิ่มรายจ่าย</a>
        <a href="history.html" class="btn btn-secondary">ประวัติ</a>
        <a id="farmMenu" href="farm.html" class="btn btn-warning">สวน</a>
	<a id="ownerMenu" href="owner.html" class="btn btn-info">เจ้าของ</a>
	<a href="farm-report.html" class="btn btn-success">รายงานสวน</a>

</div>

        <div class="card p-4">

            <div class="mb-3">
                <label>เลือกสวน</label>
                <select id="farmId" class="form-control">
</select>
            </div>

            <div class="mb-3">
                <label>ประเภท</label>
                <input type="text" id="type" class="form-control">
            </div>

            <div class="mb-3">
                <label>วันที่</label>
                <input type="date" id="date" class="form-control">
            </div>

            <div class="mb-3">
                <label>น้ำหนัก (กก.)</label>
                <input type="number" id="weight" class="form-control">
            </div>

            <div class="mb-3">
                <label>ราคา</label>
                <input type="number" id="price" class="form-control">
            </div>

            <div class="mb-3">
                <label>รูปใบเสร็จ</label>
		<input type="file" id="receiptImage" accept="image/*" capture="environment" class="form-control">
            </div>

            <button id="saveButton" class="btn btn-success" onclick="saveIncome()">บันทึก</button>

        </div>

    </div>

    <script>


if (!localStorage.getItem("userId")) {

    window.location.href =
        "login.html";

}


const role =
    localStorage.getItem("role");

if (role === "owner") {

    document.getElementById(
        "farmMenu"
    ).style.display = "none";

    document.getElementById(
        "ownerMenu"
    ).style.display = "none";

}





// ✅ function saveIncome()
async function saveIncome() {

    try {

        const button =
            document.getElementById(
                "saveButton"
            );

        button.disabled = true;
        button.innerText = "กำลังบันทึก...";

        const file =
            document.getElementById(
                "receiptImage"
            ).files[0];

        let imageUrl = "";

        if (file) {

            const formData =
                new FormData();

            formData.append(
                "image",
                file
            );

            const uploadResponse =
                await fetch(
                    "https://palm-app-jt0i.onrender.com/upload",
                    {
                        method: "POST",
                        body: formData
                    }
                );

            const uploadResult =
                await uploadResponse.json();

            imageUrl =
                uploadResult.imageUrl;

        }

        const data = {

            farmId:
                document.getElementById("farmId").value,

            type:
                document.getElementById("type").value,

            date:
                document.getElementById("date").value,

            weight:
                Number(
                    document.getElementById("weight").value
                ),

            price:
                Number(
                    document.getElementById("price").value
                ),

            receiptImage:
                imageUrl

        };

        const response =
            await fetch(
                "https://palm-app-jt0i.onrender.com/income",
                {
                    method: "POST",
                    headers: {
                        "Content-Type":
                            "application/json"
                    },
                    body:
                        JSON.stringify(data)
                }
            );

        const result =
            await response.json();

        button.disabled = false;
        button.innerText = "บันทึก";

        alert(result.message);

location.reload();

    }
    catch(error) {

        console.error(error);

        const button =
            document.getElementById(
                "saveButton"
            );

        button.disabled = false;
        button.innerText = "บันทึก";

        alert("เกิดข้อผิดพลาด");

    }

}

// ✅ function loadFarmDropdown()
async function loadFarmDropdown() {

    const response =
        await fetch("https://palm-app-jt0i.onrender.com/farm");

    const farms =
        await response.json();

    let html = "";

    farms.forEach(farm => {

        html += `
            <option value="${farm._id}">
                ${farm.name}
            </option>
        `;

    });

    document.getElementById("farmId").innerHTML =
        html;

}

// ✅ เพิ่มตรงนี้
loadFarmDropdown();

</script>

    </script>

</body>

</html>
