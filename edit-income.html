<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แก้ไขรายรับ</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <h1>✏️ แก้ไขรายรับ</h1>

<a
    href="history.html"
    class="btn btn-secondary mb-3">
    ← กลับหน้าประวัติ
</a>

    <div class="card p-4">

        <div class="mb-3">
            <label>เลือกสวน</label>
            
<select id="farmId" class="form-control"></select>

        </div>

        <div class="mb-3">
            <label>ประเภท</label>
            <input type="text" id="type" class="form-control">
        </div>

        <div class="mb-3">
            <label>วันที่</label>
            <input type="date" id="date" class="form-control">
        </div>

        <div class="mb-3">
            <label>น้ำหนัก</label>
            <input type="number" id="weight" class="form-control">
        </div>

        <div class="mb-3">
            <label>ราคา</label>
            <input type="number" id="price" class="form-control">
        </div>

        <div class="mb-3">
            <label>URL ใบเสร็จ</label>
            <input type="text" id="receiptImage" class="form-control">
        </div>

        <button class="btn btn-warning" onclick="saveEdit()">
            บันทึกการแก้ไข
        </button>

    </div>

</div>

<script>

const params =
    new URLSearchParams(window.location.search);

const id =
    params.get("id");


// ✅ function loadFarms()
async function loadFarms() {

    const response =
        await fetch(
            "https://palm-app-jt0i.onrender.com/farm"
        );

    const farms =
        await response.json();

console.log(farms);

    let html = "";

    farms.forEach(farm => {

        html += `
            <option value="${farm._id}">
                ${farm.name}
            </option>
        `;

    });

    document.getElementById("farmId").innerHTML =
        html;

}

// ✅ function loadIncome()
async function loadIncome() {

    const response =
        await fetch(
            `https://palm-app-jt0i.onrender.com/income/${id}`
        );

    const data =
        await response.json();

    document.getElementById("farmId").value =
        data.farmId || "";

    document.getElementById("type").value =
        data.type || "";

    document.getElementById("date").value =
        data.date
            ? data.date.substring(0, 10)
            : "";

    document.getElementById("weight").value =
        data.weight || 0;

    document.getElementById("price").value =
        data.price || 0;

    document.getElementById("receiptImage").value =
        data.receiptImage || "";

}


// ✅ function saveEdit()
async function saveEdit() {

    const data = {

        farmId:
            document.getElementById("farmId").value,

        type:
            document.getElementById("type").value,

        date:
            document.getElementById("date").value,

        weight:
            Number(
                document.getElementById("weight").value
            ),

        price:
            Number(
                document.getElementById("price").value
            ),

        receiptImage:
            document.getElementById("receiptImage").value

    };

    data.total =
        data.weight * data.price;

    await fetch(
        `https://palm-app-jt0i.onrender.com/income/${id}`,
        {
            method: "PUT",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        }
    );

    alert("แก้ไขสำเร็จ ✅");

    window.location.href =
        "history.html";

}


// ✅ function init()
async function init() {

    await loadFarms();

    await loadIncome();

}

init();

</script>

</body>
</html>
