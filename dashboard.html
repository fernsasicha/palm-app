<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palm App Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <div class="container mt-5">

        <h1 class="mb-4">🌴 Palm App Dashboard</h1>
	<h5 id="welcome" class="mb-3"></h5>


<div class="mb-4">

   	<a href="dashboard.html" class="btn btn-primary">Dashboard</a>
        <a href="income.html" class="btn btn-success">เพิ่มรายรับ</a>
        <a href="expense.html" class="btn btn-danger">เพิ่มรายจ่าย</a>
        <a href="history.html" class="btn btn-secondary">ประวัติ</a>
        <a id="farmMenu" href="farm.html" class="btn btn-warning">สวน</a>
	<a id="ownerMenu" href="owner.html" class="btn btn-info">เจ้าของ</a>
	<a href="farm-report.html" class="btn btn-success">รายงานสวน</a>
	
<button
    class="btn btn-dark"
    onclick="logout()">

    Logout

</button>


</div>

<div class="row">

            <div class="col-md-4 mb-3">

                <div class="card text-bg-success">
                    <div class="card-body">
                        <h5>รายรับรวม</h5>
                        <h2 id="income">กำลังโหลดข้อมูล...</h2>
                    </div>
                </div>

            </div>

            <div class="col-md-4 mb-3">

                <div class="card text-bg-danger">
                    <div class="card-body">
                        <h5>รายจ่ายรวม</h5>
                        <h2 id="expense">กำลังโหลดข้อมูล...</h2>
                    </div>
                </div>

            </div>

            <div class="col-md-4 mb-3">

                <div class="card text-bg-primary">
                    <div class="card-body">
                        <h5>กำไรสุทธิ</h5>
                        <h2 id="profit">กำลังโหลดข้อมูล...</h2>
                    </div>
                </div>

            </div>

        </div>

    </div>

    <script>


if (!localStorage.getItem("userId")) {

    window.location.href =
        "login.html";

}


const role =
    localStorage.getItem("role");



document.getElementById(
    "welcome"
).innerText =
    "สวัสดี " +
    localStorage.getItem(
        "fullName"
    );



if (role === "owner") {

    document.getElementById(
        "farmMenu"
    ).style.display = "none";

    document.getElementById(
        "ownerMenu"
    ).style.display = "none";

}




        const dashboardUrl =

    role === "owner"

    ? `https://palm-app-jt0i.onrender.com/owner-dashboard/${
        localStorage.getItem("ownerId")
      }`

    : "https://palm-app-jt0i.onrender.com/dashboard";

fetch(dashboardUrl)
    .then(response => response.json())
    .then(data => {

        document.getElementById("income").innerText =
            data.totalIncome.toLocaleString();

        document.getElementById("expense").innerText =
            data.totalExpense.toLocaleString();

        document.getElementById("profit").innerText =
            data.profit.toLocaleString();

    })
    .catch(error => {

    console.log(error);

    document.getElementById(
        "income"
    ).innerText = "ผิดพลาด";

    document.getElementById(
        "expense"
    ).innerText = "ผิดพลาด";

    document.getElementById(
        "profit"
    ).innerText = "ผิดพลาด";

});


function logout() {

    localStorage.clear();

    window.location.href =
        "login.html";

}



    </script>

</body>

</html>
