<!DOCTYPE html>
<html lang="th">

<head>

    <meta charset="UTF-8">

    <title>
        ลืมรหัสผ่าน
    </title>

    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <div class="card p-4">

        <h2>
            🔑 ลืมรหัสผ่าน
        </h2>

        <div class="mb-3">

            <label>
                เบอร์มือถือ
            </label>

            <input
                type="text"
                id="phone"
                class="form-control">

        </div>

        <div class="mb-3">

            <label>
                4 ตัวท้ายบัตรประชาชน
            </label>

            <input
                type="text"
                id="citizenLast4"
                maxlength="4"
                class="form-control">

        </div>

        <div class="mb-3">

            <label>
                รหัสผ่านใหม่
            </label>

            <input
                type="password"
                id="newPassword"
                class="form-control">

        </div>

        <button
            class="btn btn-primary"
            onclick="resetPassword()">

            เปลี่ยนรหัสผ่าน

        </button>

    </div>

</div>

<script>

async function resetPassword() {

    const response =
        await fetch(
            "https://palm-app-jt0i.onrender.com/reset-password",
            {
                method: "PUT",

                headers: {
                    "Content-Type":
                        "application/json"
                },

                body: JSON.stringify({

                    phone:
                        document.getElementById(
                            "phone"
                        ).value,

                    citizenLast4:
                        document.getElementById(
                            "citizenLast4"
                        ).value,

                    newPassword:
                        document.getElementById(
                            "newPassword"
                        ).value

                })

            }
        );

    const result =
        await response.json();

    alert(
        result.message
    );

    if (response.ok) {

        window.location.href =
            "login.html";

    }

}

</script>

</body>
</html>
