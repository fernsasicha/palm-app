<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>จัดการสวน</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <h1>🌴 จัดการสวน</h1>

    <div class="mb-4">

        <a href="dashboard.html" class="btn btn-primary">Dashboard</a>
        <a href="income.html" class="btn btn-success">เพิ่มรายรับ</a>
        <a href="expense.html" class="btn btn-danger">เพิ่มรายจ่าย</a>
        <a href="history.html" class="btn btn-secondary">ประวัติ</a>
        <a href="farm.html" class="btn btn-warning">สวน</a>
        <a href="owner.html" class="btn btn-info">เจ้าของ</a>
	<a href="farm-report.html" class="btn btn-success">รายงานสวน</a>

    </div>

    <div class="card p-4 mb-4">

        <h4>เพิ่มสวน</h4>

        <div class="mb-3">
            <label>ชื่อสวน</label>
            <input type="text" id="name" class="form-control">
        </div>

        <div class="mb-3">
            <label>ที่ตั้ง</label>
            <input type="text" id="location" class="form-control">
        </div>

        <div class="mb-3">
            <label>พื้นที่ (ไร่)</label>
            <input type="number" id="area" class="form-control">
        </div>

        <button class="btn btn-success" onclick="saveFarm()">
            บันทึกสวน
        </button>

    </div>

    <h4>รายการสวน</h4>

    <table class="table table-bordered">

        <thead>
            <tr>
                <th>ชื่อสวน</th>
                <th>ที่ตั้ง</th>
                <th>พื้นที่</th>
                <th>Farm ID</th>
            </tr>
        </thead>

        <tbody id="farmTable"></tbody>

    </table>

</div>

<script>

async function saveFarm() {

    const data = {

        name: document.getElementById("name").value,
        location: document.getElementById("location").value,
        area: Number(document.getElementById("area").value)

    };

    const response =
        await fetch("https://palm-app-jt0i.onrender.com/farm", {

            method: "POST",

            headers: {
                "Content-Type": "application/json"
            },

            body: JSON.stringify(data)

        });

    const result =
        await response.json();

    alert(result.message);

    location.reload();

}

async function loadFarm() {

    const response =
        await fetch("https://palm-app-jt0i.onrender.com/farm");

    const data =
        await response.json();

    let html = "";

    data.forEach(item => {

        html += `
        <tr>
            <td>${item.name}</td>
            <td>${item.location}</td>
            <td>${item.area}</td>
            <td>${item._id}</td>
        </tr>
        `;

    });

    document.getElementById("farmTable").innerHTML =
        html;

}

loadFarm();

</script>

</body>

</html>
