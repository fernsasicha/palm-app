<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ผูกเจ้าของกับสวน</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <h1>🤝 ผูกเจ้าของกับสวน</h1>

    <div class="mb-4">

        <a href="dashboard.html" class="btn btn-primary">Dashboard</a>
        <a href="income.html" class="btn btn-success">รายรับ</a>
        <a href="expense.html" class="btn btn-danger">รายจ่าย</a>
        <a href="history.html" class="btn btn-secondary">ประวัติ</a>
        <a href="farm.html" class="btn btn-warning">สวน</a>
        <a href="owner.html" class="btn btn-info">เจ้าของ</a>
	<a href="farm-report.html" class="btn btn-success">รายงานสวน</a>

    </div>

    <div class="card p-4 mb-4">

        <div class="mb-3">
            <label>เลือกสวน</label>
            <select id="farmId" class="form-control"></select>
        </div>

        <div class="mb-3">
            <label>เลือกเจ้าของ</label>
            <select id="ownerId" class="form-control"></select>
        </div>

        <div class="mb-3">
            <label>สัดส่วน (%)</label>
            <input type="number" id="percent" class="form-control">
        </div>

        <button class="btn btn-primary" onclick="saveFarmOwner()">
            บันทึก
        </button>

    </div>

    <table class="table table-bordered">

        <thead>
            <tr>
                <th>Farm ID</th>
                <th>Owner ID</th>
                <th>เปอร์เซ็นต์</th>
            </tr>
        </thead>

        <tbody id="farmOwnerTable"></tbody>

    </table>

</div>

<script>

async function loadFarms() {

    const response =
        await fetch("https://palm-app-jt0i.onrender.com/farm");

    const farms =
        await response.json();

    let html = "";

    farms.forEach(farm => {

        html += `
            <option value="${farm._id}">
                ${farm.name}
            </option>
        `;

    });

    document.getElementById("farmId").innerHTML =
        html;

}

async function loadOwners() {

    const response =
        await fetch("https://palm-app-jt0i.onrender.com/owner");

    const owners =
        await response.json();

    let html = "";

    owners.forEach(owner => {

        html += `
            <option value="${owner._id}">
                ${owner.name}
            </option>
        `;

    });

    document.getElementById("ownerId").innerHTML =
        html;

}

async function saveFarmOwner() {

    const data = {

        farmId:
            document.getElementById("farmId").value,

        ownerId:
            document.getElementById("ownerId").value,

        percent:
            Number(document.getElementById("percent").value)

    };

    const response =
        await fetch(
            "https://palm-app-jt0i.onrender.com/farm-owner",
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(data)
            }
        );

    const result =
        await response.json();

    alert(result.message);

    location.reload();

}

async function loadFarmOwner() {

    const response =
        await fetch("https://palm-app-jt0i.onrender.com/farm-owner");

    const data =
        await response.json();

    let html = "";

    data.forEach(item => {

        html += `
        <tr>
            <td>${item.farmId}</td>
            <td>${item.ownerId}</td>
            <td>${item.percent}%</td>
        </tr>
        `;

    });

    document.getElementById("farmOwnerTable").innerHTML =
        html;

}

loadFarms();
loadOwners();
loadFarmOwner();

</script>

</body>

</html>
