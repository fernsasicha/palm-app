		<th>จัดการ</th>
            </tr>

    </table>

</div>

<script>



if (!localStorage.getItem("userId")) {

    window.location.href =
        "login.html";

}




// ✅ function formatDate(dateString)
function formatDate(dateString) {

    if (!dateString) return "-";

    const date = new Date(dateString);

    const day =
        String(date.getDate()).padStart(2, "0");

    const month =
        String(date.getMonth() + 1).padStart(2, "0");

    const year =
        date.getFullYear();

    return `${day}/${month}/${year}`;

}


// ✅ function loadIncome()
async function loadIncome() {

    const role =
    localStorage.getItem("role");

let data;

if (role === "owner") {

    const ownerId =
        localStorage.getItem("ownerId");

    const response =
        await fetch(
            `https://palm-app-jt0i.onrender.com/owner-history/${ownerId}`
        );

    const result =
        await response.json();

    data =
        result.incomes;

}
else {

    const response =
        await fetch(
            "https://palm-app-jt0i.onrender.com/income"
        );

    data =
        await response.json();

}

    let html = "";

    for (const item of data) {

    let farmName = "-";

    if (item.farmId) {

        const farmResponse =
            await fetch(
                `https://palm-app-jt0i.onrender.com/farm/${item.farmId}`
            );

        const farm =
            await farmResponse.json();

        farmName =
            farm?.name || "-";

    }

    html += `
<tr>
    <td>${formatDate(item.date)}</td>
    <td>${farmName}</td>
    <td>${item.type || "-"}</td>
    <td>${item.total || 0}</td>

    <td>
        ${
            item.receiptImage
            ? `<a href="${item.receiptImage}" target="_blank">ดูรูป</a>`
            : "-"
        }
    </td>

    <td>

        <a
            href="edit-income.html?id=${item._id}"
            class="btn btn-warning btn-sm">
            แก้ไข
        </a>

        <button
            class="btn btn-danger btn-sm"
            onclick="deleteIncome('${item._id}')">
            ลบ
        </button>

    </td>

</tr>
`;

    }

    document.getElementById("incomeTable").innerHTML =
        html;

}

// ✅ function deleteIncome(id)
async function deleteIncome(id) {

    if (!confirm("ยืนยันการลบ?")) {
        return;
    }

    await fetch(
        `https://palm-app-jt0i.onrender.com/income/${id}`,
        {
            method: "DELETE"
        }
    );

    location.reload();

}

// ✅ function editIncome(id, oldType)
async function editIncome(id, oldType) {

    const newType =
        prompt(
            "แก้ไขประเภท",
            oldType
        );

    if (!newType) return;

    await fetch(
        `https://palm-app-jt0i.onrender.com/income/${id}`,
        {
            method: "PUT",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                type: newType
            })
        }
    );

    location.reload();

}
