<!DOCTYPE html>
<html lang="th">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>สมัครสมาชิก</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <div class="card p-4">

        <h2>📝 สมัครสมาชิก</h2>

        <div class="mb-3">

            <label>ชื่อ-นามสกุล</label>

            <input
                type="text"
                id="fullName"
                class="form-control">

        </div>

        <div class="mb-3">

            <label>เบอร์มือถือ</label>

            <input
                type="text"
                id="phone"
                class="form-control">

        </div>

        <div class="mb-3">

            <label>เลขบัตรประชาชน</label>

            <input
                type="text"
                id="citizenId"
                maxlength="13"
                class="form-control">

        </div>

        <div class="mb-3">

            <label>รหัสผ่าน</label>

            <input
                type="password"
                id="password"
                class="form-control">

        </div>

        <div class="mb-3">

            <label>ยืนยันรหัสผ่าน</label>

            <input
                type="password"
                id="confirmPassword"
                class="form-control">

        </div>

        <button
            id="registerButton"
            class="btn btn-success"
            onclick="register()">

            สมัครสมาชิก

        </button>

    </div>

</div>

<script>

async function register() {

    const fullName =
        document.getElementById(
            "fullName"
        ).value.trim();

    const phone =
        document.getElementById(
            "phone"
        ).value.trim();

    const citizenId =
        document.getElementById(
            "citizenId"
        ).value.trim();

    const password =
        document.getElementById(
            "password"
        ).value;

    const confirmPassword =
        document.getElementById(
            "confirmPassword"
        ).value;

    if (
        !fullName ||
        !phone ||
        !citizenId ||
        !password
    ) {

        alert(
            "กรุณากรอกข้อมูลให้ครบ"
        );

        return;

    }

    if (citizenId.length !== 13) {

        alert(
            "เลขบัตรประชาชนต้องมี 13 หลัก"
        );

        return;

    }

    if (password !== confirmPassword) {

        alert(
            "รหัสผ่านไม่ตรงกัน"
        );

        return;

    }

    const button =
        document.getElementById(
            "registerButton"
        );

    button.disabled = true;

    button.innerText =
        "กำลังสมัคร...";

    try {

        const response =
            await fetch(
                "https://palm-app-jt0i.onrender.com/register",
                {
                    method: "POST",
                    headers: {
                        "Content-Type":
                            "application/json"
                    },
                    body: JSON.stringify({
                        fullName,
                        phone,
                        password,
                        citizenId
                    })
                }
            );

        const result =
    await response.json();

alert(result.message);

        button.disabled = false;

        button.innerText =
            "สมัครสมาชิก";

        alert(
            result.message
        );

        if (response.ok) {

            window.location.href =
                "login.html";

        }

    }
    catch (error) {

        console.log(error);

        button.disabled = false;

        button.innerText =
            "สมัครสมาชิก";

        alert(
            "เชื่อมต่อเซิร์ฟเวอร์ไม่สำเร็จ"
        );

    }

}

</script>

</body>

</html>
``
