<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>จัดการเจ้าของ</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <h1>👤 จัดการเจ้าของ</h1>

    <div class="mb-4">

        <a href="dashboard.html" class="btn btn-primary">Dashboard</a>
        <a href="income.html" class="btn btn-success">เพิ่มรายรับ</a>
        <a href="expense.html" class="btn btn-danger">เพิ่มรายจ่าย</a>
        <a href="history.html" class="btn btn-secondary">ประวัติ</a>
        <a href="farm.html" class="btn btn-warning">สวน</a>
        <a href="owner.html" class="btn btn-info">เจ้าของ</a>
	<a href="farm-report.html" class="btn btn-success">รายงานสวน</a>

    </div>

    <div class="card p-4 mb-4">

        <h4>เพิ่มเจ้าของ</h4>

        <div class="mb-3">
            <label>ชื่อเจ้าของ</label>
            <input type="text" id="name" class="form-control">
        </div>

        <div class="mb-3">
            <label>เบอร์โทร</label>
            <input type="text" id="phone" class="form-control">
        </div>

        <button class="btn btn-info" onclick="saveOwner()">
            บันทึกเจ้าของ
        </button>

    </div>

    <h4>รายการเจ้าของ</h4>

    <table class="table table-bordered">

        <thead>
            <tr>
                <th>ชื่อ</th>
                <th>เบอร์โทร</th>
                <th>Owner ID</th>
                <th>จัดการ</th>
            </tr>
        </thead>

        <tbody id="ownerTable"></tbody>

    </table>

</div>

<script>

async function saveOwner() {

    const data = {
        name: document.getElementById("name").value,
        phone: document.getElementById("phone").value
    };

    const response = await fetch(
        "https://palm-app-jt0i.onrender.com/owner",
        {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        }
    );

    const result = await response.json();

    alert(result.message);

    location.reload();

}

async function loadOwner() {

    const response =
        await fetch("https://palm-app-jt0i.onrender.com/owner");

    const data =
        await response.json();

    let html = "";

    data.forEach(item => {

        html += `
        <tr>
            <td>${item.name}</td>
            <td>${item.phone}</td>
            <td>${item._id}</td>
            <td>
                <button
                    class="btn btn-danger btn-sm"
                    onclick="deleteOwner('${item._id}')">
                    ลบ
                </button>
            </td>
        </tr>
        `;

    });

    document.getElementById("ownerTable").innerHTML =
    html;

}

async function deleteOwner(id) {

    if (!confirm("ยืนยันการลบ?")) {
        return;
    }

    await fetch(
        `https://palm-app-jt0i.onrender.com/owner/${id}`,
        {
            method: "DELETE"
        }
    );

    location.reload();

}

loadOwner();

</script>

</body>
</html>
